<h2>Character List</h2>

<app-characterfilter (houseSelected)="onHouseSelected($event)"></app-characterfilter>

<div class="spinner-container" *ngIf="loading">
  <mat-spinner></mat-spinner>
</div>

<p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

<div class="character-grid" *ngIf="!loading">
  <mat-card class="character-card" *ngFor="let character of characters">
    <img
      mat-card-image
      [src]="getCharacterImage(character.image)"
      [alt]="character.name"
    />

    <mat-card-content>
      <h3>{{ character.name }}</h3>
      <p><strong>House:</strong> {{ getHouseLabel(character.house) }}</p>
    </mat-card-content>

    <mat-card-actions>
      <a mat-raised-button color="primary" [routerLink]="['/characters', character.id]">
        View Details
      </a>
    </mat-card-actions>
  </mat-card>
</div>
